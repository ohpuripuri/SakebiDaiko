<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>叫び代行サービス</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #ff3c00;
    --accent2: #ff7a00;
    --text: #f0ede8;
    --muted: #666;
    --error: #ff3c00;
    --success: #00ff88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 背景ノイズ */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 640px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  /* ヘッダー */
  header {
    text-align: center;
    margin-bottom: 64px;
  }

  .logo {
    font-family: 'Zen Antique Soft', serif;
    font-size: clamp(42px, 10vw, 72px);
    line-height: 1;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: flicker 4s ease-in-out infinite;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.8; }
    94% { opacity: 1; }
    96% { opacity: 0.9; }
    97% { opacity: 1; }
  }

  .tagline {
    margin-top: 16px;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* フォームカード */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 40px;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .field {
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  label span {
    color: var(--accent);
    margin-left: 2px;
  }

  input[type="email"],
  input[type="text"],
  textarea,
  select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    padding: 14px 16px;
    transition: border-color 0.2s;
    outline: none;
    -webkit-appearance: none;
  }

  input[type="email"]:focus,
  input[type="text"]:focus,
  textarea:focus,
  select:focus {
    border-color: var(--accent);
  }

  textarea {
    min-height: 140px;
    resize: vertical;
    line-height: 1.7;
  }

  select {
    cursor: pointer;
  }

  select option {
    background: var(--bg);
  }

  /* 文字数カウンター */
  .char-counter {
    text-align: right;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  .char-counter.warn { color: var(--accent2); }
  .char-counter.over  { color: var(--accent); }

  /* フィルター結果バナー */
  #filter-banner {
    display: none;
    padding: 12px 16px;
    border-radius: 2px;
    font-size: 13px;
    margin-bottom: 20px;
    border-left: 3px solid;
  }

  #filter-banner.checking {
    background: #1a1a00;
    border-color: var(--accent2);
    color: var(--accent2);
  }

  #filter-banner.ok {
    background: #001a0d;
    border-color: var(--success);
    color: var(--success);
  }

  #filter-banner.ng {
    background: #1a0000;
    border-color: var(--error);
    color: var(--error);
  }

  /* 送信ボタン */
  .btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 2px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 18px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .btn:hover { background: #e03500; }
  .btn:active { transform: scale(0.99); }

  .btn:disabled {
    background: #333;
    color: var(--muted);
    cursor: not-allowed;
  }

  .btn .loading {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn.is-loading .label { display: none; }
  .btn.is-loading .loading { display: flex; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* 送信完了 */
  #success {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  #success .icon {
    font-size: 64px;
    animation: bounce 0.6s ease;
  }

  @keyframes bounce {
    0%   { transform: scale(0); }
    60%  { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  #success h2 {
    font-family: 'Zen Antique Soft', serif;
    font-size: 28px;
    margin: 20px 0 12px;
    color: var(--accent);
  }

  #success p {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.8;
  }

  /* 注意事項 */
  .notes {
    margin-top: 20px;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.8;
  }

  .notes a {
    color: var(--accent);
    text-decoration: none;
  }

  /* 入力エラー */
  .field-error {
    font-size: 11px;
    color: var(--error);
    margin-top: 6px;
    display: none;
  }

  input.error, textarea.error, select.error {
    border-color: var(--error);
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">叫び代行</div>
    <p class="tagline">あなたの代わりに、全力で叫びます</p>
  </header>

  <div class="card">

    <div id="form-wrap">
      <div id="filter-banner"></div>

      <div class="field">
        <label>叫んでほしい内容 <span>*</span></label>
        <textarea id="message" placeholder="例：疲れすぎて無理！&#10;&#10;思いのままに書いてください。" maxlength="300" oninput="updateCounter()"></textarea>
        <div class="char-counter" id="counter">0 / 300</div>
        <div class="field-error" id="message-error">内容を入力してください</div>
      </div>



      <button class="btn" id="submit-btn" onclick="handleSubmit()">
        <span class="label">叫んでもらう</span>
        <span class="loading"><span class="spinner"></span>確認中...</span>
      </button>

      <p class="notes">
        送信いただいた内容は叫び手本人のみが確認します。<br>
        公序良俗に反する内容・他者への誹謗中傷はお断りします。
        個人情報は記載しないでください。
      </p>
    </div>

    <div id="success">
      <div class="icon">🎤</div>
      <h2>受け付けました！</h2>
      <p style="color: var(--muted); font-size: 13px;">あなただけの合言葉はこちら</p>
      <div id="secret-code" style="
        font-family: 'Zen Antique Soft', serif;
        font-size: 48px;
        letter-spacing: 0.2em;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin: 16px 0 24px;
      "></div>
      <p style="color: var(--muted); font-size: 13px; line-height: 1.9;">
        叫び終わったらX上でお知らせします。<br>
        この合言葉をXのDMで送ってください。
      </p>
    </div>

  </div>
</div>

<script>
const ANTHROPIC_API_URL = "https://api.anthropic.com/v1/messages";

function updateCounter() {
  const msg = document.getElementById('message');
  const counter = document.getElementById('counter');
  const len = msg.value.length;
  counter.textContent = `${len} / 300`;
  counter.className = 'char-counter' + (len > 270 ? ' over' : len > 200 ? ' warn' : '');
}

function showBanner(type, text) {
  const b = document.getElementById('filter-banner');
  b.style.display = 'block';
  b.className = type;
  b.textContent = text;
}

function hideBanner() {
  document.getElementById('filter-banner').style.display = 'none';
}

function validate() {
  let ok = true;

  const msg = document.getElementById('message').value.trim();
  const msgErr = document.getElementById('message-error');
  const msgEl = document.getElementById('message');
  if (!msg) {
    msgErr.style.display = 'block';
    msgEl.classList.add('error');
    ok = false;
  } else {
    msgErr.style.display = 'none';
    msgEl.classList.remove('error');
  }

  return ok;
}

async function checkContent(message) {
  const response = await fetch(ANTHROPIC_API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: `あなたはコンテンツモデレーターです。
ユーザーが入力したテキストが以下のいずれかに該当するか判定してください。
- 性的・卑猥な内容
- 特定個人への誹謗中傷
- 差別的・ヘイト的な内容
- 暴力的・危険な内容

判定結果のみをJSON形式で返してください。他の文章は一切含めないでください。
{"ok": true} または {"ok": false, "reason": "理由"}`,
      messages: [{ role: "user", content: message }]
    })
  });
  const data = await response.json();
  const text = data.content.map(i => i.text || "").join("");
  const clean = text.replace(/```json|```/g, "").trim();
  return JSON.parse(clean);
}

function handleSubmit() {
  if (!validate()) return;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.classList.add('is-loading');

  setTimeout(() => {
    const kana = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワ';
    const code = Array.from({length: 4}, () => kana[Math.floor(Math.random() * kana.length)]).join('');
    document.getElementById('secret-code').textContent = code;
    document.getElementById('form-wrap').style.display = 'none';
    document.getElementById('success').style.display = 'block';
  }, 600);
}
</script>
</body>
</html>
